name: Update deals data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"  # todos los días a las 07:00 España aprox (UTC+2)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
      ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
      ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}

    steps:
      # 🔹 Checkout completo (IMPORTANTE para evitar errores de push)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔹 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔹 Dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 🔹 Test API (no rompe workflow si falla)
      - name: Test AliExpress API
        run: python scripts/test_aliexpress_api.py
        continue-on-error: true

      # 🔹 Obtener productos AliExpress
      - name: Refresh AliExpress products
        run: python scripts/refresh_aliexpress_products.py

      # 🔹 Mezclar con el resto de fuentes
      - name: Update merged deals
        run: python scripts/update_deals.py

      # 🔹 Commit solo si hay cambios
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update deals data"
          fi

      # 🔹 Evita conflictos con otros pushes
      - name: Rebase and push changes
        run: |
          git pull --rebase origin main
          git push origin main
