name: Update deals data

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Refresh Decathlon products
        env:
          DECATHLON_FEED_URL: ${{ secrets.DECATHLON_FEED_URL }}
        run: python scripts/refresh_decathlon_products.py

      - name: Refresh AliExpress products
        continue-on-error: true
        env:
          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
          ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
          ALIEXPRESS_API_URL: ${{ secrets.ALIEXPRESS_API_URL }}
        run: python scripts/refresh_aliexpress_products.py

      - name: Refresh Amazon products
        env:
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_PAAPI_ACCESS_KEY: ${{ secrets.AMAZON_PAAPI_ACCESS_KEY }}
          AMAZON_PAAPI_SECRET_KEY: ${{ secrets.AMAZON_PAAPI_SECRET_KEY }}
          AMAZON_PAAPI_PARTNER_TAG: ${{ secrets.AMAZON_PAAPI_PARTNER_TAG }}
          AMAZON_PAAPI_REGION: ${{ secrets.AMAZON_PAAPI_REGION }}
          AMAZON_PAAPI_HOST: ${{ secrets.AMAZON_PAAPI_HOST }}
        run: python scripts/refresh_amazon_products.py

      - name: Update merged deals
        run: python scripts/update_deals.py

      - name: Generate product pages
        run: python scripts/generate_static_product_pages.py

      - name: Generate static guides
        run: python scripts/generate_static_guides.py

      - name: Generate sitemap
        run: python scripts/generate_sitemap.py

      - name: Debug generated output
        if: always()
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          deals_path = Path("data/generated_deals.json")
          summary_path = Path("data/merge_summary.json")

          print("===== CHOLLOBICI UPDATE DEBUG =====")
          print("generated_deals exists:", deals_path.exists())
          if deals_path.exists():
              deals = json.loads(deals_path.read_text(encoding="utf-8"))
              print("total deals:", len(deals))
              print("by source:", dict(Counter(d.get("source", "unknown") for d in deals)))
              print("first 3:", deals[:3])

          print("merge_summary exists:", summary_path.exists())
          if summary_path.exists():
              print(summary_path.read_text(encoding="utf-8"))
          print("===================================")
          PY

      - name: Upload generated data artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chollobici-generated-data
          path: |
            data/generated_deals.json
            data/merge_summary.json
            data/decathlon_products.json
            data/aliexpress_products.json
            data/amazon_products.json
            sitemap.xml

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json sitemap.xml producto/ || true
          git add casco* gafas* luces* herramientas* ropa* componentes* accesorios* taller* bolsas* hidratacion* electronica* || true
          git commit -m "Update deals data" || echo "No changes"
          git push || echo "Nothing to push"
