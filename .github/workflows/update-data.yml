name: Update deals data

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      # -----------------------------
      # DECATHLON
      # -----------------------------
      - name: Refresh Decathlon products
        run: python scripts/refresh_decathlon_products.py

      - name: DEBUG FILE AFTER SCRIPT
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("data/decathlon_products.json")
          print("AFTER SCRIPT EXISTS:", p.exists())
          if p.exists():
              text = p.read_text(encoding="utf-8")
              print("AFTER SCRIPT BYTES:", len(text))
              data = json.loads(text)
              print("AFTER SCRIPT COUNT:", len(data))
              print("AFTER SCRIPT FIRST:", data[:2])
          PY

      - name: DEBUG Decathlon output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("data/decathlon_products.json")
          print("===== DECATHLON DEBUG =====")
          print("FILE EXISTS:", p.exists())

          if p.exists():
              data = json.loads(p.read_text(encoding="utf-8"))
              print("TOTAL PRODUCTS:", len(data))
              print("FIRST 3:")
              for i, item in enumerate(data[:3]):
                  print(f"{i+1} ->", item)
          else:
              print("FILE NOT FOUND")
          print("===========================")
          PY

      - name: Upload Decathlon JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: decathlon-products-json
          path: data/decathlon_products.json

      # -----------------------------
      # ALIEXPRESS
      # -----------------------------
      - name: Refresh AliExpress products
        run: python scripts/update_deals.py

      - name: DEBUG final deals
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("data/generated_deals.json")
          print("===== FINAL DEALS DEBUG =====")
          print("FILE EXISTS:", p.exists())

          if p.exists():
              data = json.loads(p.read_text(encoding="utf-8"))
              print("TOTAL DEALS:", len(data))

              deca = [d for d in data if d.get("source") == "decathlon"]
              print("DECATHLON DEALS:", len(deca))

              print("FIRST 3 DEALS:")
              for i, item in enumerate(data[:3]):
                  print(f"{i+1} ->", item)
          else:
              print("FILE NOT FOUND")
          print("=============================")
          PY

      - name: Upload final deals JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-deals-json
          path: data/generated_deals.json

      # -----------------------------
      # COMMIT (si usas repo como storage)
      # -----------------------------
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/*.json || true
          git commit -m "Update deals data" || echo "No changes"
          git push || echo "Nothing to push"
