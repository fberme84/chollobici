name: update-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests
      - env:
          DECATHLON_FEED_URL: ${{ secrets.DECATHLON_FEED_URL }}
        run: python scripts/refresh_decathlon_products.py
      - run: python scripts/update_deals.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: decathlon-debug
          path: data/debug_decathlon_raw.txt
