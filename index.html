<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CholloBici | Ofertas de ciclismo</title>
  <meta name="description" content="Las mejores ofertas de ciclismo. Nosotros detectamos ofertas, tú ahorras.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">
      <h1 class="logo">🚴 CholloBici</h1>
      <div class="header-actions">
        <button class="btn-secondary">♡ Solo favoritos</button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- FILTROS -->
    <section class="filters">
      <div class="filters-header">
        <span class="chip">BÚSQUEDA Y FILTROS</span>
        <button class="btn-secondary small">Ocultar</button>
      </div>

      <h2>Afina los chollos</h2>

      <div class="filters-grid">

        <div class="filter-group">
          <label>Buscar</label>
          <input type="text" placeholder="Ej. casco, Shimano, gafas, luz...">
        </div>

        <div class="filter-group">
          <label>Tienda</label>
          <select>
            <option>Todas</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Descuento mínimo</label>
          <select>
            <option>Cualquiera</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Ordenar por</label>
          <select>
            <option>Más recomendados</option>
          </select>
        </div>

      </div>
    </section>

    <!-- TOP PICKS -->
    <section class="section-block">
      <span class="chip">SELECCIÓN DESTACADA</span>
      <h2>Top del momento</h2>

      <!-- 🔥 AQUÍ RENDERIZA app.js -->
      <div id="top-picks" class="grid"></div>
    </section>

    <!-- LISTADO -->
    <section class="section-block">
      <span class="chip">LISTADO COMPLETO</span>
      <h2>Ofertas disponibles</h2>

      <!-- 🔥 AQUÍ RENDERIZA app.js -->
      <div id="deals-grid" class="grid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <p>© CholloBici · Enlaces de afiliación y almacenamiento local para favoritos.</p>
      <a href="#">Cookies y privacidad</a>
    </div>
  </footer>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
