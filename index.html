<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CholloBici</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="wrap hero-inner">
      <div class="brand-lockup">
        <img src="assets/chollobici-logo.png" alt="CholloBici" class="brand-logo">
        <div class="brand-copy">
          <span class="brand-kicker">Detector de ofertas ciclistas</span>
          <h1>CholloBici</h1>
          <p class="subtitle">Chollos de bici detectados automáticamente para encontrar mejores precios más rápido.</p>
          <div class="brand-microcopy">
            <span class="micro-pill">⚡ Seguimiento de precio</span>
            <span class="micro-pill">🛒 Enlace directo a tienda</span>
            <span class="micro-pill">🏷️ Detección de bajadas</span>
          </div>
        </div>
      </div>
      <div class="hero-panel">
        <div class="stats" id="stats"></div>
        <p id="lastUpdate" class="last-update"></p>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="filters card">
      <div class="filter-row">
        <label>
          <span>Buscar</span>
          <input type="text" id="searchInput" placeholder="Ej. Shimano, casco, MTB...">
        </label>

        <label>
          <span>Categoría</span>
          <select id="categoryFilter">
            <option value="">Todas</option>
          </select>
        </label>

        <label>
          <span>Tienda</span>
          <select id="storeFilter">
            <option value="">Todas</option>
          </select>
        </label>

        <label>
          <span>Descuento mínimo</span>
          <select id="discountFilter">
            <option value="0">Cualquiera</option>
            <option value="10">10%</option>
            <option value="20">20%</option>
            <option value="30">30%</option>
            <option value="40">40%</option>
          </select>
        </label>

        <label>
          <span>Ordenar por</span>
          <select id="sortFilter">
            <option value="recomendacion">Recomendación</option>
            <option value="discount">Mayor descuento</option>
            <option value="price_asc">Precio más bajo</option>
            <option value="price_desc">Precio más alto</option>
          </select>
        </label>
      </div>
    </section>

    <section id="dealsInfo" class="info-line"></section>
    <section id="dealsGrid" class="deals-grid"></section>
  </main>

  <template id="dealCardTemplate">
    <article class="deal-card card">
      <div class="deal-image-wrap">
        <span class="badge badge-store badge-store-overlay"></span>
        <img class="deal-image" alt="" loading="lazy">
      </div>
      <div class="deal-body">
        <div class="deal-topline">
          <span class="badge badge-status"></span>
          <span class="badge badge-pick"></span>
        </div>
        <h2 class="deal-title"></h2>
        <p class="deal-meta"></p>
        <div class="price-row">
          <span class="price-current"></span>
          <span class="price-old"></span>
          <span class="price-discount"></span>
        </div>
        <p class="deal-reason"></p>
        <div class="deal-actions">
          <a class="btn" target="_blank" rel="noopener sponsored nofollow">Ver oferta</a>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
