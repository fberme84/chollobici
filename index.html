<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CholloBici</title>
  <meta name="description" content="CholloBici detecta ofertas de ciclismo para ayudarte a ahorrar en componentes, accesorios, GPS, herramientas y más.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero hero-dark">
  <div class="wrap hero-dark-inner">
    <img src="assets/chollobici-logo.png" alt="CholloBici" class="logo-main">
    
    
  </div>
</header>

  <main class="wrap">
    <section class="intro-strip card">
      <h2>Ofertas de bici seleccionadas para ahorrar de verdad</h2>
      <p>Buscamos bajadas de precio y destacamos los chollos más interesantes en accesorios, gafas, electrónica, herramientas y más.</p>
    </section>

    <section class="toolbar-row">
      <button type="button" id="favoritesToggle" class="toggle-btn" aria-pressed="false">♡ Solo favoritos</button>
    </section>

    <section class="top-picks card" id="topPicksSection">
      <div class="section-head">
        <h2>Top del día</h2>
        <p>Las ofertas más potentes ahora mismo</p>
      </div>
      <div class="top-picks-grid" id="topPicksGrid"></div>
    </section>

    <section class="filters card">
      <div class="filter-row">
        <label>
          <span>Buscar</span>
          <input type="text" id="searchInput" placeholder="Ej. Shimano, casco, MTB...">
        </label>

        <label>
          <span>Categoría</span>
          <select id="categoryFilter">
            <option value="">Todas</option>
          </select>
        </label>

        <label>
          <span>Tienda</span>
          <select id="storeFilter">
            <option value="">Todas</option>
          </select>
        </label>

        <label>
          <span>Descuento mínimo</span>
          <select id="discountFilter">
            <option value="0">Cualquiera</option>
            <option value="10">10%</option>
            <option value="20">20%</option>
            <option value="30">30%</option>
            <option value="40">40%</option>
          </select>
        </label>

        <label>
          <span>Ordenar por</span>
          <select id="sortFilter">
            <option value="recomendacion">Recomendación</option>
            <option value="discount">Mayor descuento</option>
            <option value="price_asc">Precio más bajo</option>
            <option value="price_desc">Precio más alto</option>
          </select>
        </label>
      </div>
    </section>

    <section id="dealsInfo" class="info-line"></section>
    <section id="dealsGrid" class="deals-grid"></section>
  </main>

  <template id="dealCardTemplate">
    <article class="deal-card card">
      <div class="deal-image-wrap">
        <span class="badge badge-store badge-store-overlay"></span>
        <img class="deal-image" alt="" loading="lazy">
      </div>
      <div class="deal-body">
        <div class="deal-topline">
          <span class="badge badge-status"></span>
          <span class="badge badge-pick"></span>
        </div>
        <h2 class="deal-title"></h2>
        <p class="deal-meta"></p>
        <div class="price-row">
          <span class="price-current"></span>
          <span class="price-old"></span>
          <span class="price-discount"></span>
        </div>
        <p class="deal-reason"></p>
        <div class="deal-actions">
          <a class="btn" target="_blank" rel="noopener sponsored nofollow">Ver chollo</a>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
