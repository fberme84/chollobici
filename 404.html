<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página no encontrada | CholloBici</title>
  <meta name="robots" content="noindex, follow">
  <script>
    (function() {
      const path = window.location.pathname;

      // 🔁 Redirección de productos antiguos → HOME
      if (path.startsWith('/producto/')) {
        window.location.replace('/');
        return;
      }

      // 🔁 Redirección de guías sin slash final
      const guias = [
        'mejores-gafas-ciclismo-baratas',
        'mejores-luces-bici-potentes-baratas',
        'ropa-ciclismo-verano-barata',
        'accesorios-ciclismo-baratos',
        'herramientas-bici-baratas'
      ];

      const cleanPath = path.replace(/^\/|\/$/g, '');

      if (guias.includes(cleanPath)) {
        window.location.replace('/' + cleanPath + '/');
        return;
      }

      // 🔁 fallback → HOME
      window.location.replace('/');
    })();
  </script>
</head>
<body>
  <p>Redirigiendo...</p>
</body>
</html>
